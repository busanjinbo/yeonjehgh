<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카카오톡 공유용 썸네일 (1200x630)</title>
<!-- Pretendard 폰트 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        primary: '#ffffff',
        secondary: '#addef8',
        secondarydark: '#7bc1e8',
        point: '#e60012',
        dark: '#1e293b',
      }
    }
  }
}
</script>
<style>
  body {
    margin: 0; padding: 0;
    /* 카카오톡 OG Image 최적화 사이즈 */
    width: 1200px;
    height: 630px;
    background-color: #f0f9ff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
</style>
</head>
<body>
  <div class="w-full h-full relative flex items-center bg-white shadow-2xl overflow-hidden border-8 border-secondary">
    <!-- 배경 장식 -->
    <div class="absolute top-0 right-0 w-[800px] h-[800px] bg-secondary rounded-full opacity-30 transform translate-x-1/3 -translate-y-1/4"></div>
    <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-sky-200 rounded-full opacity-40 transform -translate-x-1/3 translate-y-1/3"></div>

    <div class="relative z-10 w-1/2 pl-16 pr-8 flex flex-col justify-center h-full">
      <div class="flex items-center gap-4 mb-6">
        <img src="./assets/logo.png" alt="진보당 로고" class="h-10 w-auto object-contain">
        <div class="w-14 h-14 rounded-full bg-secondary flex items-center justify-center text-dark font-extrabold text-3xl border-2 border-white shadow-md">
          5
        </div>
      </div>
      
      <p class="text-3xl text-secondarydark font-bold mb-4 bg-sky-100/80 inline-block px-4 py-2 rounded-xl self-start">
        [동/읍] [선거종류] 후보
      </p>

      <h1 class="text-7xl font-black text-dark leading-tight tracking-tight mb-6">
        일하는 <br/> [선거종류],<br/>
        <span class="text-secondarydark">[후보자명]</span>
      </h1>
      

    </div>

    <!-- 우측 후보자 사진 -->
    <div class="relative z-10 w-1/2 h-full flex items-end justify-center pt-16">
      <div class="w-10/12 h-full bg-secondary/20 rounded-t-full relative flex items-end justify-center shadow-xl border-t-8 border-x-8 border-white">
        <!-- 프로필 사진의 경우 아래 src를 ./assets/profile.png 로 유지하고 스크린샷 캡쳐 후 사용하시면 됩니다 -->
        <img src="./assets/profile.png" alt="후보자 사진" class="w-full object-cover object-top h-[110%] rounded-t-full rounded-b-lg">
      </div>
    </div>
  </div>
</body>
</html>
